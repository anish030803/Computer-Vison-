# EfficientNet-B4 Training Configuration
# DR Detection System — Two-phase training with full hyperparameter spec

# --- Model Architecture (TRD §4.1) ---
model:
  name: "efficientnet_b4"
  backbone: "tf_efficientnet_b4_ns"    # timm: noisy-student pretrained
  pretrained: true
  num_classes: 5
  image_size: 380
  head:
    pool: "avg"                        # Global Average Pooling
    use_batchnorm: true
    hidden_dim: 256
    hidden_activation: "relu"
    dropout_post_pool: 0.4
    dropout_post_hidden: 0.3
  stochastic_depth_rate: 0.2

# --- Two-Phase Training (TRD §4.1) ---
training:
  # Phase 1: Head Warmup — backbone frozen
  phase1:
    description: "Head warmup — backbone frozen"
    freeze_backbone: true
    epochs: 20
    optimizer:
      name: "adamw"
      lr: 1.0e-3
      weight_decay: 1.0e-4
      betas: [0.9, 0.999]
    scheduler:
      name: "cosine_with_warmup"
      warmup_epochs: 5
      min_lr: 1.0e-6
    loss:
      name: "cross_entropy"
      label_smoothing: 0.1
      class_weights: null              # Computed from cleaned data
    batch_size: 64

  # Phase 2: Fine-tuning — top 50% backbone unfrozen
  phase2:
    description: "Fine-tuning — top 50% backbone unfrozen"
    freeze_backbone: false
    unfreeze_ratio: 0.5
    epochs: 25
    optimizer:
      name: "adamw"
      lr: 3.0e-5
      weight_decay: 1.0e-3
      betas: [0.9, 0.999]
    scheduler:
      name: "cosine_with_warmup"
      warmup_epochs: 3
      min_lr: 1.0e-7
    loss:
      name: "focal_loss"
      label_smoothing: 0.05
      class_weights: null
      focal_loss_gamma: 2.0
    batch_size: 64
    gradient_clipping:
      max_norm: 1.0
    mixup:
      enabled: true
      alpha: 0.4

# --- Overfitting Prevention (TRD §5) ---
regularization:
  early_stopping:
    monitor: "val_qwk"
    patience: 7
    mode: "max"
  reduce_lr_on_plateau:
    monitor: "val_qwk"
    factor: 0.5
    patience: 3
    mode: "max"

# --- Data Augmentation (PRD FR-14) ---
augmentation:
  train:
    horizontal_flip: true
    vertical_flip: true
    rotation_limit: 36
    zoom_range: [0.9, 1.1]
    brightness_limit: 0.1
    contrast_limit: 0.1
    clahe: true
    coarse_dropout: true
    grid_distortion: true
    normalize:
      mean: [0.485, 0.456, 0.406]     # ImageNet
      std: [0.229, 0.224, 0.225]
  val:
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

# --- Hardware & Performance ---
hardware:
  device: "cuda"
  mixed_precision: true
  precision: "bf16"
  num_workers: 8
  pin_memory: true
  prefetch_factor: 2

# --- Monitoring ---
monitoring:
  tensorboard:
    enabled: false
    log_dir: "logs/tensorboard/efficientnet_b4"
  wandb:
    enabled: false
    project: "dr-detection"
    entity: null
  log_every_n_steps: 50

# --- Checkpointing ---
checkpointing:
  save_dir: "checkpoints/efficientnet_b4"
  save_every_epoch: false
  save_best_only: false
  monitor: "val_qwk"
  mode: "max"

# --- Reproducibility ---
seed: 42

# --- Paths ---
data_config: "configs/data_config.yaml"
output_dir: "outputs/efficientnet_b4"
